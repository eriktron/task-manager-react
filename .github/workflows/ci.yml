name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    # Eliminamos el "working-directory: ./frontend" porque tu frontend está en la raíz
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Busca el package-lock.json en la raíz
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build

  backend:
    name: Backend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # Esto se queda igual porque tu backend sí está en /backend
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      
      # --- PASO CRUCIAL PARA PRISMA ---
      # Si no agregamos esto, tu backend fallará al intentar compilar o validar el linter
      - name: Generate Prisma Client
        run: npx prisma generate

      - run: npm run lint --if-present
      - run: npm run build --if-present
  pruebas:
    name: Pruebas unitarias y cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Instalar dependencias del proyecto
        run: npm ci
        
      - name: Ejecutar pruebas y validar Cobertura (Quality Gate)
        run: npx vitest run --coverage

  e2e:
    name: Pruebas E2E (Playwright)
    runs-on: ubuntu-latest
    
    # 👇 LEVANTAMOS UN POSTGRESQL REAL EN SEGUNDO PLANO
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: task_manager_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        # Esperamos a que Postgres esté listo antes de arrancar los pasos del job
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Instalar dependencias del Proyecto (Raíz/Frontend)
        run: npm ci

      - name: Instalar dependencias del Backend
        run: |
          cd backend
          npm ci

      # 👇 Sincronizamos las tablas de Prisma con la base de datos PostgreSQL de arriba
      - name: Inicializar Base de Datos Postgres de Pruebas
        run: |
          cd backend
          npx prisma db push
        env:
          DATABASE_URL: "postgresql://postgres:postgres_password@localhost:5432/task_manager_test?schema=public"

      # Levantar el backend apuntando a la base de datos Postgres del pipeline
      - name: Levantar Backend en segundo plano
        run: |
          cd backend
          npx ts-node src/index.ts &
        env:
          DATABASE_URL: "postgresql://postgres:postgres_password@localhost:5432/task_manager_test?schema=public"
          PORT: 3000
          
      - name: Esperar a que el backend esté listo
        run: npx wait-on http://localhost:3000/tasks --timeout 20000

      - name: Instalar Navegador Chromium de Playwright
        run: npx playwright install --with-deps chromium
        
      - name: Ejecutar Pruebas E2E con Servidores Corriendo
        run: npx playwright test