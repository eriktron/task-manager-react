name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Habilita la ejecución manual desde la pestaña Actions en GitHub
    inputs:
      confirmacion:
        description: 'Escribe DEPLOY para confirmar el despliegue a produccion'
        required: true
        default: ''

jobs:
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    # Eliminamos el "working-directory: ./frontend" porque tu frontend está en la raíz
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Busca el package-lock.json en la raíz
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build

  backend:
    name: Backend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # Esto se queda igual porque tu backend sí está en /backend
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      
      # --- PASO CRUCIAL PARA PRISMA ---
      # Si no agregamos esto, tu backend fallará al intentar compilar o validar el linter
      - name: Generate Prisma Client
        run: npx prisma generate

      - run: npm run lint --if-present
      - run: npm run build --if-present
  pruebas:
    name: Pruebas unitarias y cobertura
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Instalar dependencias del proyecto
        run: npm ci
        
      - name: Ejecutar pruebas y validar Cobertura (Quality Gate)
        run: npx vitest run --coverage

  e2e:
    name: Pruebas E2E (Playwright)
    runs-on: ubuntu-latest
    
    # LEVANTAMOS UN POSTGRESQL REAL EN SEGUNDO PLANO
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: task_manager_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Instalar dependencias de todo el proyecto
        run: |
          npm ci
          cd backend && npm ci

      - name: Generar Cliente de Prisma
        run: |
          cd backend
          npx prisma generate

      - name: Sincronizar Base de Datos Postgres de Pruebas
        run: |
          cd backend
          npx prisma db push
        env:
          DATABASE_URL: "postgresql://postgres:postgres_password@localhost:5432/task_manager_test?schema=public"

      - name: Instalar Navegadores de Playwright
        run: npx playwright install --with-deps chromium
        
      - name: Ejecutar Pruebas E2E (Playwright se encarga de iniciar el servidor)
        run: npx playwright test
        env:
          # Variables de entorno para el Backend
          DATABASE_URL: "postgresql://postgres:postgres_password@localhost:5432/task_manager_test?schema=public"
          PORT: 3000
          # 👇 VARIABLE PARA EL FRONTEND: Apunta al backend local de pruebas
          # (Cambia VITE_API_URL por el nombre exacto de la variable que uses en tu .env.local si es diferente)
          VITE_API_URL: "http://localhost:3000"

  migraciones:
    name: Migraciones y Seeds
    runs-on: ubuntu-latest
    # 2.1: El servicio de PostgreSQL efímero (temporal)
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-timeout 5s
          --health-interval 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

    # 2.2: Los pasos secuenciales de la línea de ensamblaje
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json # Apunta al lock del backend

      - name: Instalar dependencias del Backend
        run: npm ci

      - name: Aplicar migraciones de Prisma
        run: npx prisma migrate deploy 

  deploy-staging:
    name: Deploy a Staging
    # Asegúrate de que los nombres en 'needs' correspondan a los jobs reales de tu pipeline
    needs: [frontend, backend, pruebas, e2e, migraciones]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Revisar el código
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Debug Railway context
        run: railway status --json
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Desplegar a Railway (staging)
        run: railway up --service "$RAILWAY_SERVICE_ID" --environment "$RAILWAY_ENVIRONMENT_ID"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID_STAGING }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID_STAGING }} 

  deploy-produccion:
    name: Deploy a Producción (manual)
    # Este job SOLO se ejecuta si el disparador fue manual Y se escribió "DEPLOY"
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirmacion == 'DEPLOY'
    runs-on: ubuntu-latest
    steps:
      - name: Revisar el código
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli
      
      - name: Debug Railway context
        run: railway status --json
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Desplegar a Railway (produccion)
        run: railway up --service "$RAILWAY_SERVICE_ID" --environment "$RAILWAY_ENVIRONMENT_ID"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID_PRODUCTION }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID_PRODUCTION }} 
          